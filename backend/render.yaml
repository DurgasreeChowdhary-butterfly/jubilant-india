services:
  - type: web
    name: jubilant-india-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: PLAYWRIGHT_ENABLED
        value: "true"
      - key: DB_PATH
        value: /data/jobs.db
    disk:
      name: jubilant-db
      mountPath: /data
      sizeGB: 1
